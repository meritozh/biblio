<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Biblio Commit Trend Chart</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          'Nunito Sans',
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          Roboto,
          Oxygen,
          Ubuntu,
          Cantarell,
          sans-serif;
        background: #fffdf5;
        color: #3d3629;
        padding: 40px 20px;
        min-height: 100vh;
      }

      .container {
        max-width: 1200px;
        margin: 0 auto;
      }

      h1 {
        font-family: 'Cormorant Garamond', Georgia, serif;
        font-size: 2.5rem;
        font-weight: 600;
        margin-bottom: 10px;
        color: #3d3629;
      }

      .subtitle {
        color: #8b7355;
        margin-bottom: 40px;
        font-size: 1rem;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin-bottom: 40px;
      }

      .stat-card {
        background: white;
        border-radius: 12px;
        padding: 24px;
        box-shadow: 0 2px 8px rgba(61, 54, 41, 0.08);
        transition: all 0.2s ease;
      }

      .stat-card:hover {
        box-shadow: 0 4px 16px rgba(61, 54, 41, 0.12);
        transform: translateY(-2px);
      }

      .stat-label {
        font-size: 0.875rem;
        color: #8b7355;
        margin-bottom: 8px;
        font-weight: 500;
      }

      .stat-value {
        font-size: 2rem;
        font-weight: 700;
        color: #3d3629;
      }

      .chart-container {
        background: white;
        border-radius: 16px;
        padding: 32px;
        box-shadow: 0 2px 8px rgba(61, 54, 41, 0.08);
        margin-bottom: 40px;
      }

      canvas {
        width: 100% !important;
        height: 400px !important;
      }

      .legend {
        display: flex;
        justify-content: center;
        gap: 24px;
        margin-top: 20px;
        padding-top: 20px;
        border-top: 1px solid rgba(139, 115, 85, 0.1);
      }

      .legend-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.875rem;
        color: #8b7355;
      }

      .legend-color {
        width: 12px;
        height: 12px;
        border-radius: 3px;
      }

      .peak-day {
        background: linear-gradient(135deg, #8b7355 0%, #6b5344 100%);
        color: white;
        border-radius: 12px;
        padding: 20px;
        margin-top: 20px;
      }

      .peak-day h3 {
        font-size: 0.875rem;
        font-weight: 600;
        margin-bottom: 8px;
        opacity: 0.9;
      }

      .peak-day .date {
        font-size: 1.25rem;
        font-weight: 700;
      }

      .activity-bar {
        margin-top: 20px;
      }

      .activity-bar-label {
        display: flex;
        justify-content: space-between;
        margin-bottom: 8px;
        font-size: 0.875rem;
      }

      .activity-bar-track {
        height: 8px;
        background: rgba(139, 115, 85, 0.1);
        border-radius: 4px;
        overflow: hidden;
      }

      .activity-bar-fill {
        height: 100%;
        background: linear-gradient(90deg, #8b7355 0%, #6b5344 100%);
        border-radius: 4px;
        transition: width 0.5s ease;
      }
    </style>
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Nunito+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container">
      <h1>Commit Activity Trend</h1>
      <p class="subtitle">Daily commit history from February 27 to April 2, 2026</p>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Total Commits</div>
          <div class="stat-value" id="totalCommits">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Active Days</div>
          <div class="stat-value" id="activeDays">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Average per Day</div>
          <div class="stat-value" id="avgPerDay">0</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Peak Commits</div>
          <div class="stat-value" id="peakCommits">0</div>
        </div>
      </div>

      <div class="chart-container">
        <canvas id="commitChart"></canvas>
        <div class="legend">
          <div class="legend-item">
            <div class="legend-color" style="background: #8b7355"></div>
            <span>Daily Commits</span>
          </div>
          <div class="legend-item">
            <div class="legend-color" style="background: rgba(139, 115, 85, 0.2)"></div>
            <span>Trend Line</span>
          </div>
        </div>
      </div>

      <div class="peak-day">
        <h3>Most Productive Day</h3>
        <div class="date" id="peakDate">March 22, 2026</div>
        <div class="activity-bar">
          <div class="activity-bar-label">
            <span>Daily Activity</span>
            <span id="peakPercent">100%</span>
          </div>
          <div class="activity-bar-track">
            <div class="activity-bar-fill" style="width: 100%"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const commitData = [
        { date: '2026-02-27', count: 1 },
        { date: '2026-03-01', count: 6 },
        { date: '2026-03-02', count: 3 },
        { date: '2026-03-04', count: 2 },
        { date: '2026-03-05', count: 6 },
        { date: '2026-03-06', count: 4 },
        { date: '2026-03-07', count: 2 },
        { date: '2026-03-08', count: 1 },
        { date: '2026-03-09', count: 3 },
        { date: '2026-03-22', count: 32 },
        { date: '2026-03-23', count: 2 },
        { date: '2026-03-24', count: 1 },
        { date: '2026-03-26', count: 3 },
        { date: '2026-03-27', count: 21 },
        { date: '2026-03-28', count: 8 },
        { date: '2026-04-01', count: 1 },
        { date: '2026-04-02', count: 1 },
      ];

      // Calculate stats
      const totalCommits = commitData.reduce((sum, d) => sum + d.count, 0);
      const activeDays = commitData.length;
      const avgPerDay = (totalCommits / activeDays).toFixed(1);
      const peakDay = commitData.reduce((max, d) => (d.count > max.count ? d : max));

      // Update DOM
      document.getElementById('totalCommits').textContent = totalCommits;
      document.getElementById('activeDays').textContent = activeDays;
      document.getElementById('avgPerDay').textContent = avgPerDay;
      document.getElementById('peakCommits').textContent = peakDay.count;
      document.getElementById('peakDate').textContent = new Date(peakDay.date).toLocaleDateString(
        'en-US',
        {
          month: 'long',
          day: 'numeric',
          year: 'numeric',
        }
      );

      // Create chart
      const canvas = document.getElementById('commitChart');
      const ctx = canvas.getContext('2d');

      // Set actual size
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;
      ctx.scale(dpr, dpr);

      const width = rect.width;
      const height = rect.height;
      const padding = { top: 40, right: 40, bottom: 80, left: 60 };
      const chartWidth = width - padding.left - padding.right;
      const chartHeight = height - padding.top - padding.bottom;

      // Draw grid
      ctx.strokeStyle = 'rgba(139, 115, 85, 0.1)';
      ctx.lineWidth = 1;

      const maxValue = Math.max(...commitData.map((d) => d.count));
      const gridLines = 5;

      for (let i = 0; i <= gridLines; i++) {
        const y = padding.top + (chartHeight / gridLines) * i;
        ctx.beginPath();
        ctx.moveTo(padding.left, y);
        ctx.lineTo(width - padding.right, y);
        ctx.stroke();

        // Y-axis labels
        const value = Math.round(maxValue - (maxValue / gridLines) * i);
        ctx.fillStyle = '#8B7355';
        ctx.font = '12px Nunito Sans';
        ctx.textAlign = 'right';
        ctx.fillText(value, padding.left - 10, y + 4);
      }

      // Draw bars
      const barWidth = chartWidth / commitData.length - 8;
      const barSpacing = 8;

      commitData.forEach((d, i) => {
        const x = padding.left + i * (chartWidth / commitData.length) + barSpacing / 2;
        const barHeight = (d.count / maxValue) * chartHeight;
        const y = padding.top + chartHeight - barHeight;

        // Bar gradient
        const gradient = ctx.createLinearGradient(x, y, x, y + barHeight);
        gradient.addColorStop(0, '#8B7355');
        gradient.addColorStop(1, '#6B5344');

        // Draw bar
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.roundRect(x, y, barWidth, barHeight, 4);
        ctx.fill();

        // X-axis labels
        const date = new Date(d.date);
        const label = `${date.getMonth() + 1}/${date.getDate()}`;

        ctx.fillStyle = '#8B7355';
        ctx.font = '11px Nunito Sans';
        ctx.textAlign = 'center';
        ctx.save();
        ctx.translate(x + barWidth / 2, height - padding.bottom + 20);
        ctx.rotate(-Math.PI / 4);
        ctx.fillText(label, 0, 0);
        ctx.restore();
      });

      // Draw trend line (simple moving average)
      ctx.beginPath();
      ctx.strokeStyle = 'rgba(139, 115, 85, 0.3)';
      ctx.lineWidth = 2;

      commitData.forEach((d, i) => {
        const x =
          padding.left + i * (chartWidth / commitData.length) + barSpacing / 2 + barWidth / 2;
        const y = padding.top + chartHeight - (d.count / maxValue) * chartHeight;

        if (i === 0) {
          ctx.moveTo(x, y);
        } else {
          ctx.lineTo(x, y);
        }
      });

      ctx.stroke();

      // Draw dots on trend line
      commitData.forEach((d, i) => {
        const x =
          padding.left + i * (chartWidth / commitData.length) + barSpacing / 2 + barWidth / 2;
        const y = padding.top + chartHeight - (d.count / maxValue) * chartHeight;

        ctx.beginPath();
        ctx.fillStyle = '#8B7355';
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.fillStyle = 'white';
        ctx.arc(x, y, 2, 0, Math.PI * 2);
        ctx.fill();
      });

      // Chart title
      ctx.fillStyle = '#3D3629';
      ctx.font = '16px Nunito Sans';
      ctx.fontWeight = '600';
      ctx.textAlign = 'left';
      ctx.fillText('Daily Commit Activity', padding.left, 24);
    </script>
  </body>
</html>
